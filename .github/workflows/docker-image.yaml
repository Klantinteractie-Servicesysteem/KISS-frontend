name: Docker CI

on:
  pull_request:
    branches:
      - main
      - "*.*.*"

  push:
    branches:
      - main
    tags: ["v*.*.*"]

  workflow_dispatch:

env:
  # add environment variables
  SHOULD_PUSH: ${{ github.event_name != 'pull_request' }}
  SHOULD_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') }}
  IS_LATEST: false
  VERSION: ""
  REVISION: ""
  CHART_NAME: kiss-chart
  CHART_URL: ghcr.io/klantinteractie-servicesysteem
  SYNCTOOL_IMAGE_NAME: kiss-elastic-sync
  # CONTAINER_REGISTRY_BASE and CONTAINER_PROJECT_NAME are defined in the .env file because they are used in the docker-compose.deploy.yaml file.
  # we probably want to simplify the build process in the future by moving these to the github workflow file and removing the docker-compose.deploy.yaml file alltogether.

jobs:
  build-node:
    runs-on: ubuntu-latest
    permissions:
      statuses: write
      checks: write
      contents: write
      pull-requests: write
      actions: write
      packages: write

    steps:
      - uses: actions/checkout@v3

      # find the latest release tag (for determining if this should be marked as 'latest')
      - name: "Find the latest release tag (determined by semver sort)"
        id: latest-semver
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          REPO_URL: ${{ github.event.repository.html_url }}
          TAG_FILTER: '^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$'
        run: |
          TAG=$(\
            git ls-remote --exit-code --refs --tags --sort='-v:refname' "$REPO_URL" \
            | awk '{print $2}' | grep -E "$TAG_FILTER" | head -n 1
          )
          echo "tag-ref=${TAG}" >> "$GITHUB_OUTPUT"
          if [ "$TAG" = "${{ github.ref }}" ] ; then
              echo "IS_LATEST=true" >> "$GITHUB_ENV"
          fi

      - name: Setting CONTAINER_PROJECT_NAME
        run: |
          NAME=$(grep CONTAINER_PROJECT_NAME= .env | cut -d '=' -f2)
          echo "CONTAINER_PROJECT_NAME=$NAME" >> $GITHUB_ENV

      - name: Setting CONTAINER_REGISTRY_BASE
        run: |
          NAME=$(grep CONTAINER_REGISTRY_BASE= .env | cut -d '=' -f2)
          echo "CONTAINER_REGISTRY_BASE=$NAME" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        if: github.event_name != 'pull_request'

      # extract Docker metadata for semantic versioning
      - name: Extract Docker metadata for kiss-frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          flavor: |
            latest=${{ env.IS_LATEST }}
          images: |
            ${{ env.CONTAINER_REGISTRY_BASE }}/${{ env.CONTAINER_PROJECT_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Extract Docker metadata for kiss-elastic-sync
        id: meta-synctool
        uses: docker/metadata-action@v5
        with:
          flavor: |
            latest=${{ env.IS_LATEST }}
          images: |
            ${{ env.CONTAINER_REGISTRY_BASE }}/${{ env.SYNCTOOL_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      # set version and revision in environment variables
      - name: Set version and revision in env
        run: |
          echo "VERSION=${{ fromJson(env.SHOULD_RELEASE) && fromJSON(steps.meta-frontend.outputs.json).labels['org.opencontainers.image.version'] || '0.0.0' }}" >> "$GITHUB_ENV"
          echo "REVISION=${{ fromJSON(steps.meta-frontend.outputs.json).labels['org.opencontainers.image.revision'] }}" >> "$GITHUB_ENV"

      # build containers
      - name: Build kiss containers
        uses: docker/bake-action@v5
        with:
          push: false
          load: true
          files: docker-compose.deploy.yaml
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: copy testresults
        uses: docker/build-push-action@v4
        with:
          push: false
          load: false
          context: .
          file: Kiss.Bff/Dockerfile
          target: test
          outputs: testresults
          build-args: |
            VERSION=${{ env.VERSION }}
            REVISION=${{ env.REVISION }}

      - name: dotnet test report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: dotnet tests
          path: testresults/*.trx
          reporter: dotnet-trx

      - name: npm test report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: npm tests
          path: testresults/*.xml
          reporter: jest-junit

      # push image with tags
      - name: push frontend image
        uses: docker/build-push-action@v4
        if: github.event_name != 'pull_request'
        with:
          context: .
          file: Kiss.Bff/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          target: final
          build-args: |
            VERSION=${{ env.VERSION }}
            REVISION=${{ env.REVISION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: build & push synctool image
        uses: docker/build-push-action@v4
        if: github.event_name != 'pull_request'
        with:
          context: Kiss.Elastic.Sync
          file: Kiss.Elastic.Sync/src/Kiss.Elastic.Sync/Dockerfile
          push: ${{ fromJSON(env.SHOULD_PUSH) }}
          tags: ${{ steps.meta-synctool.outputs.tags }}
          labels: ${{ steps.meta-synctool.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
            REVISION=${{ env.REVISION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: test helm chart
        working-directory: helm/${{env.CHART_NAME}}
        run: helm template . --debug --values dummy-values.yaml

      - name: Update chart values with new image tag
        if: ${{ fromJson(env.SHOULD_RELEASE) }}
        uses: mikefarah/yq@v4.34.1
        with:
          cmd: |
            yq eval '.appVersion = "${{ env.VERSION }}"' -i helm/${{env.CHART_NAME}}/Chart.yaml
            yq eval '.version = "${{ env.VERSION }}"' -i helm/${{env.CHART_NAME}}/Chart.yaml
            yq eval '.image.tag = "${{ env.VERSION }}"' -i helm/${{env.CHART_NAME}}/values.yaml
            yq eval '.settings.syncJobs.image.tag = "${{ env.VERSION }}"' -i helm/${{env.CHART_NAME}}/values.yaml

      - name: push helm chart to oci
        if: ${{ fromJson(env.SHOULD_RELEASE) }}
        working-directory: helm
        run: |
          helm package ./${{env.CHART_NAME}}
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.CHART_URL }} --username ${{ github.actor }} --password-stdin
          helm push ${{env.CHART_NAME}}-${{ env.VERSION }}.tgz oci://${{ env.CHART_URL }}

  elastic-sync-integration-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      checks: write
      pull-requests: write
      packages: write

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "8.0.x"
      - run: dotnet test Kiss.Elastic.Sync/test/Kiss.Elastic.Sync.IntegrationTest -c Release --logger trx --results-directory ./testresults -v n /p:CollectCoverage=true /p:CoverletOutput=./testresults/ /p:CoverletOutputFormat=lcov

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          action_fail: true
          files: |
            testresults/*.trx
            testresults/*.xml
