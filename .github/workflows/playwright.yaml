name: Playwright Tests
on:
  schedule:
    - cron: "0 16 * * *"
  pull_request:
    branches: [main, master]
    paths: ["Kiss.Bff.EndToEndTest/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: playwright-tests-group
  cancel-in-progress: false

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      
      - name: Build
        working-directory: ./Kiss.Bff.EndToEndTest
        run: dotnet build
      
      - name: Ensure browsers are installed
        working-directory: ./Kiss.Bff.EndToEndTest
        run: pwsh bin/Debug/net8.0/playwright.ps1 install --with-deps
      
      - name: Run all tests (first attempt)
        id: first-run
        continue-on-error: true
        working-directory: ./Kiss.Bff.EndToEndTest
        run: |
          # Run tests and capture output
          dotnet test --no-build \
            --logger "console;verbosity=normal" \
            --results-directory ./TestResults 2>&1 | tee first-run.log
          
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          echo "First run exit code: $EXIT_CODE"
          
          # Save failed tests to a simple list file
          if [ $EXIT_CODE -ne 0 ]; then
            # Extract fully qualified test names from MSTest output
            # Look for lines like: "Test method Kiss.Bff.EndToEndTest.Namespace.ClassName.MethodName threw exception:"
            # The fully qualified name comes after "Test method " and before " threw exception"
            grep -oE "Test method [A-Za-z0-9_\.]+ threw exception:" first-run.log | \
              sed -E 's/Test method ([A-Za-z0-9_\.]+) threw exception:/\1/' | \
              grep -E "^Kiss\.Bff\.EndToEndTest\." | \
              sort -u > failed-tests.txt || echo "" > failed-tests.txt
            
            FAILED_COUNT=$(wc -l < failed-tests.txt | tr -d ' ')
            
            # If we didn't find any fully qualified names, try the old pattern as fallback
            if [ $FAILED_COUNT -eq 0 ]; then
              echo "⚠️  Could not extract fully qualified names with primary pattern, trying alternative..."
              # Try old pattern: "Failed Kiss.Bff.EndToEndTest.Namespace.ClassName.MethodName [duration]"
              grep -oE "Failed\s+[A-Za-z0-9_\.]+\s+\[" first-run.log | \
                sed -E 's/Failed\s+([A-Za-z0-9_\.]+)\s+\[/\1/' | \
                grep -E "^Kiss\.Bff\.EndToEndTest\." | \
                sort -u > failed-tests.txt || echo "" > failed-tests.txt
              FAILED_COUNT=$(wc -l < failed-tests.txt | tr -d ' ')
            fi
            
            echo "failed_count=$FAILED_COUNT" >> $GITHUB_OUTPUT
            echo "Extracted $FAILED_COUNT failed test names to failed-tests.txt"
            
            if [ -s failed-tests.txt ]; then
              echo "Failed tests:"
              cat failed-tests.txt
            else
              echo "⚠️  Warning: Could not extract any fully qualified test names"
            fi
          else
            echo "failed_count=0" >> $GITHUB_OUTPUT
          fi
          
          # Always exit 0 here to continue to retry step
          exit 0
        env:
          TestSettings__TEST_USERNAME: ${{ secrets.PLAYWRIGHT_USERNAME }}
          TestSettings__TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_PASSWORD }}
          TestSettings__TEST_TOTP_SECRET: ${{ secrets.PLAYWRIGHT_TOTP_SECRET }}
          TestSettings__TEST_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          TestSettings__TEST_OPEN_KLANT_BASE_URL: ${{ secrets.PLAYWRIGHT_OPEN_KLANT_BASE_URL }}
          TestSettings__TEST_OPEN_KLANT_SECRET: ${{ secrets.PLAYWRIGHT_OPEN_KLANT_SECRET }}

      - name: Extract and retry only failed tests
        if: steps.first-run.outputs.exit_code != '0'
        id: retry-run
        continue-on-error: true
        working-directory: ./Kiss.Bff.EndToEndTest
        run: |
          echo "════════════════════════════════════════════════════"
          echo "⚠️  FIRST RUN FAILED - Retrying failed tests..."
          echo "════════════════════════════════════════════════════"
          echo ""
          
          # Check if we have failed tests
          if [ ! -f failed-tests.txt ] || [ ! -s failed-tests.txt ]; then
            echo "❌ No failed tests list found or it's empty"
            echo ""
            echo "=== Showing last 50 lines of first run log ==="
            tail -50 first-run.log
            echo ""
            # Don't set outputs when we can't extract - let the workflow fail properly
            exit 1
          fi
          
          FAILED_COUNT=$(wc -l < failed-tests.txt | tr -d ' ')
          echo "📊 Found $FAILED_COUNT failed test(s):"
          cat failed-tests.txt
          echo ""
          
          RETRY_PASSED=0
          RETRY_FAILED=0
          
          # Save failed test names for retry results
          > retry-results.log
          
          # Retry each failed test individually
          while IFS= read -r test_name; do
            if [ -n "$test_name" ]; then
              echo ""
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "🔄 Retrying: $test_name"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              
              # Try to run the specific test
              set +e
              dotnet test \
                --no-build \
                --filter "FullyQualifiedName~${test_name}" \
                --logger "console;verbosity=normal" 2>&1 | tee -a retry-results.log
              TEST_RESULT=${PIPESTATUS[0]}
              set -e
              
              # Check if test was actually found and run
              if grep -q "No test matches the given testcase filter" retry-results.log; then
                echo "   ⚠️  Test not found with filter - trying exact match"
                set +e
                dotnet test \
                  --no-build \
                  --filter "FullyQualifiedName=${test_name}" \
                  --logger "console;verbosity=normal" 2>&1 | tee -a retry-results.log
                TEST_RESULT=${PIPESTATUS[0]}
                set -e
              fi
              
              if [ $TEST_RESULT -eq 0 ]; then
                echo "   ✅ PASSED on retry"
                echo "$test_name: PASSED" >> retry-summary.txt
                RETRY_PASSED=$((RETRY_PASSED + 1))
              else
                echo "   ❌ FAILED again"
                echo "$test_name: FAILED" >> retry-summary.txt
                RETRY_FAILED=$((RETRY_FAILED + 1))
              fi
            fi
          done < failed-tests.txt
          
          echo ""
          echo "═══════════════════════════════════════════"
          echo "📊 Retry Summary"
          echo "═══════════════════════════════════════════"
          echo "Tests failed initially: $FAILED_COUNT"
          echo "Passed on retry:        $RETRY_PASSED"
          echo "Still failed:           $RETRY_FAILED"
          echo "═══════════════════════════════════════════"
          
          # Save outputs for summary
          echo "total_failed=$FAILED_COUNT" >> $GITHUB_OUTPUT
          echo "retry_passed=$RETRY_PASSED" >> $GITHUB_OUTPUT
          echo "retry_failed=$RETRY_FAILED" >> $GITHUB_OUTPUT
          
          # Exit with failure if any tests still failed
          if [ $RETRY_FAILED -gt 0 ]; then
            echo ""
            echo "❌ $RETRY_FAILED test(s) still failing after retry"
            echo ""
            echo "Tests still failing:"
            grep "FAILED" retry-summary.txt || true
            exit 1
          else
            echo ""
            echo "✅ All failed tests passed on retry!"
            exit 0
          fi
        env:
          TestSettings__TEST_USERNAME: ${{ secrets.PLAYWRIGHT_USERNAME }}
          TestSettings__TEST_PASSWORD: ${{ secrets.PLAYWRIGHT_PASSWORD }}
          TestSettings__TEST_TOTP_SECRET: ${{ secrets.PLAYWRIGHT_TOTP_SECRET }}
          TestSettings__TEST_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
          TestSettings__TEST_OPEN_KLANT_BASE_URL: ${{ secrets.PLAYWRIGHT_OPEN_KLANT_BASE_URL }}
          TestSettings__TEST_OPEN_KLANT_SECRET: ${{ secrets.PLAYWRIGHT_OPEN_KLANT_SECRET }}

      - name: Generate Summary
        if: always()
        working-directory: ./Kiss.Bff.EndToEndTest
        run: |
          echo "## 🧪 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          FIRST_EXIT="${{ steps.first-run.outputs.exit_code }}"
          FIRST_FAILED="${{ steps.first-run.outputs.failed_count }}"
          
          if [ "$FIRST_EXIT" == "0" ]; then
            echo "✅ **All tests passed on first run!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "### 📊 First Run Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Extract test counts from first run log
            if [ -f first-run.log ]; then
              TOTAL_TESTS=$(grep -oP "Total tests: \K\d+" first-run.log | tail -1 || echo "N/A")
              PASSED_TESTS=$(grep -oP "Passed: \K\d+" first-run.log | tail -1 || echo "N/A")
              FAILED_TESTS=$(grep -oP "Failed: \K\d+" first-run.log | tail -1 || echo "N/A")
              SKIPPED_TESTS=$(grep -oP "Skipped: \K\d+" first-run.log | tail -1 || echo "N/A")
              
              echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
              echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
              echo "| Total | $TOTAL_TESTS |" >> $GITHUB_STEP_SUMMARY
              echo "| ✅ Passed | $PASSED_TESTS |" >> $GITHUB_STEP_SUMMARY
              echo "| ❌ Failed | $FAILED_TESTS |" >> $GITHUB_STEP_SUMMARY
              if [ "$SKIPPED_TESTS" != "0" ] && [ "$SKIPPED_TESTS" != "N/A" ]; then
                echo "| ⏭️ Skipped | $SKIPPED_TESTS |" >> $GITHUB_STEP_SUMMARY
              fi
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
            
            # Show failed test names
            if [ -f failed-tests.txt ] && [ -s failed-tests.txt ]; then
              echo "<details>" >> $GITHUB_STEP_SUMMARY
              echo "<summary>Failed tests (click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              cat failed-tests.txt >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi
            
            # Show retry results if retry was executed
            TOTAL="${{ steps.retry-run.outputs.total_failed }}"
            PASSED="${{ steps.retry-run.outputs.retry_passed }}"
            FAILED="${{ steps.retry-run.outputs.retry_failed }}"
            
            if [ -n "$TOTAL" ] && [ "$TOTAL" != "0" ]; then
              echo "### 🔄 Retry Run Results" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
              echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
              echo "| Tests retried | $TOTAL |" >> $GITHUB_STEP_SUMMARY
              echo "| ✅ Passed on retry | $PASSED |" >> $GITHUB_STEP_SUMMARY
              echo "| ❌ Still failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              
              # Show retry details if available
              if [ -f retry-summary.txt ]; then
                echo "<details>" >> $GITHUB_STEP_SUMMARY
                echo "<summary>Retry details (click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
                echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
                cat retry-summary.txt >> $GITHUB_STEP_SUMMARY
                echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
                echo "</details>" >> $GITHUB_STEP_SUMMARY
                echo "" >> $GITHUB_STEP_SUMMARY
              fi
              
              if [ "$FAILED" == "0" ]; then
                echo "### ✅ Final Result: All failed tests passed on retry!" >> $GITHUB_STEP_SUMMARY
              else
                echo "### ❌ Final Result: $FAILED test(s) still failing after retry" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "⚠️ **Retry step was skipped or had issues**" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 [View Playwright Traces](https://klantinteractie-servicesysteem.github.io/KISS-frontend/)" >> $GITHUB_STEP_SUMMARY

      - name: Fail job if tests failed
        if: |
          steps.first-run.outputs.exit_code != '0' && (
            steps.retry-run.outcome == 'skipped' ||
            steps.retry-run.outcome == 'failure' ||
            (steps.retry-run.outputs.retry_failed != '0' && steps.retry-run.outputs.retry_failed != '')
          )
        run: |
          echo "❌ Tests failed after retry or retry was skipped"
          echo "Failed on first run: ${{ steps.first-run.outputs.failed_count }}"
          echo "Still failed after retry: ${{ steps.retry-run.outputs.retry_failed }}"
          echo "Retry step outcome: ${{ steps.retry-run.outcome }}"
          exit 1
      
      - name: Success message for tests that passed on retry
        if: |
          steps.first-run.outputs.exit_code != '0' && 
          steps.retry-run.outcome == 'success' && 
          steps.retry-run.outputs.retry_failed == '0'
        run: |
          echo "✅ All tests passed! Some failed initially but all passed on retry."
          echo "Failed on first run: ${{ steps.first-run.outputs.failed_count }}"
          echo "Passed on retry: ${{ steps.retry-run.outputs.retry_passed }}"

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./Kiss.Bff.EndToEndTest/bin/Debug/net8.0/playwright-traces"
      
      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: Kiss.Bff.EndToEndTest/bin/Debug/net8.0/screenshots/
          retention-days: 30

  deploy:
    if: ${{ always() && needs.test.result != 'cancelled' && github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
