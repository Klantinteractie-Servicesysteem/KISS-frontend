## ================== Open Crawler Configuration - Elasticsearch ====================
## Config for docker.elastic.co/integrations/crawler:1.0.0
## Replace placeholders (https://www.example.nl, ${ELASTIC_HOST}, ${ELASTIC_API_KEY})
## before running. Env-style placeholders are NOT expanded by the crawler itself;
## either render this file from a template or substitute values at deploy time.

## ------------------------------- Domains ------------------------------------
domains:
  - url: https://testing.googleblog.com

    exclude_tags:
      - header
      - footer
      - nav

    crawl_rules:
      - policy: deny
        type: contains
        pattern: /login
      - policy: deny
        type: contains
        pattern: /logout

## ------------------------------- Output -------------------------------------
output_sink: elasticsearch
output_index: search-website

## ------------------------------- Crawl limits -------------------------------
max_crawl_depth: 1
max_extracted_links_count: 10
max_unique_url_count: 10
purge_crawl_enabled: true
full_html_extraction_enabled: false
# user_agent: "My-Crawler/1.0"
# threads_per_crawl: 5

## ------------------------------- Binary content -----------------------------
binary_content_extraction_enabled: true
binary_content_extraction_mime_types:
  - application/pdf
  - application/msword
  - application/vnd.openxmlformats-officedocument.wordprocessingml.document

## ------------------------------- Logging ------------------------------------
log_level: info
event_logs_to_file: false
system_logs_to_file: false

## ------------------------------- Elasticsearch ------------------------------
## In Kubernetes, this file is generated by the Helm chart from values.yaml.
## For local dev, replace the placeholders below manually.
elasticsearch:
  host: https://YOUR_ES_HOST
  port: 443
  username: YOUR_ES_USERNAME
  password: YOUR_ES_PASSWORD
  bulk_api:
    max_items: 100
    max_size_bytes: 1_048_576
