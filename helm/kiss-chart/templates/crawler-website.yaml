{{ if $.Values.settings.syncJobs.website -}}
{{ range $index, $websiteJob := $.Values.settings.syncJobs.website }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "kiss-frontend.fullname" $ }}-crawler-website-{{ $index }}
  labels:
    {{- include "kiss-frontend.labels" $ | nindent 4 }}
spec:
  schedule: {{ (default "*/59 * * * *" $websiteJob.schedule) | quote }}
  concurrencyPolicy: Forbid
  {{- if or ($websiteJob.historyLimit) (eq (toString $websiteJob.historyLimit) "0") }}
  successfulJobsHistoryLimit: {{ $websiteJob.historyLimit }}
  failedJobsHistoryLimit: {{ $websiteJob.historyLimit }}
  {{- else }}
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  {{- end }}
  jobTemplate:
    spec:
      template:
        metadata:
          annotations:
          {{- with $.Values.podAnnotations }}
          {{- toYaml . | nindent 12 }}
          {{- end }}
          labels:
            {{- include "kiss-frontend.labels" $ | nindent 12 }}
            {{- with $.Values.podLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        spec:
          {{- with $.Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          serviceAccountName: {{ include "kiss-frontend.serviceAccountName" $ }}
          securityContext:
            {{- toYaml $.Values.podSecurityContext | nindent 12 }}
          restartPolicy: OnFailure
          containers:
            - name: crawler
              securityContext:
                {{- toYaml $.Values.securityContext | nindent 16 }}
              image: "{{ $.Values.settings.syncJobs.crawlerImage.repository }}:{{ $.Values.settings.syncJobs.crawlerImage.tag }}"
              imagePullPolicy: {{ $.Values.settings.syncJobs.crawlerImage.pullPolicy }}
              command:
                - bin/crawler
              args:
                - crawl
                - /app/config/crawler.yml
              resources:
              {{- toYaml $websiteJob.resources | nindent 16 }}
              volumeMounts:
                - name: crawler-config
                  mountPath: /app/config
                  readOnly: true
                {{- if $.Values.extraVolumeMounts }}
                {{- include "kiss-frontend.tplvalues.render" ( dict "value" $.Values.extraVolumeMounts "context" $ ) | nindent 16 }}
                {{- end }}
          volumes:
            - name: crawler-config
              secret:
                secretName: {{ include "kiss-frontend.fullname" $ }}-crawler-website-{{ $index }}
            {{- if $.Values.extraVolumes }}
            {{- include "kiss-frontend.tplvalues.render" ( dict "value" $.Values.extraVolumes "context" $ ) | nindent 12 }}
            {{- end }}
          {{- with $.Values.nodeSelector }}
          nodeSelector:
          {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $.Values.affinity }}
          affinity:
          {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $.Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
{{- end }}
